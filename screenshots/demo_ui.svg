<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800">
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  <rect x="40" y="30" width="1120" height="70" rx="8" fill="#0f172a" />
  <text x="80" y="78" fill="#ffffff" font-family="Arial" font-size="28">Context-Aware Document Q&amp;A (Demo)</text>

  <g transform="translate(60,120)">
    <rect width="520" height="120" rx="8" fill="#ffffff" stroke="#e6eef8" />
    <text x="18" y="28" fill="#0b1220" font-family="Arial" font-size="16">Upload PDF</text>
    <rect x="18" y="40" width="160" height="36" rx="6" fill="#0f172a"/>
    <text x="36" y="64" fill="#fff" font-family="Arial" font-size="14">Choose file</text>

    <text x="18" y="100" fill="#6b7280" font-family="Arial" font-size="12">or paste text into the editor on the right</text>
  </g>

  <g transform="translate(600,120)">
    <rect width="560" height="300" rx="8" fill="#ffffff" stroke="#e6eef8" />
    <text x="18" y="28" fill="#0b1220" font-family="Arial" font-size="16">Document Editor / Preview</text>
    <rect x="18" y="50" width="520" height="200" rx="4" fill="#fbfdff" stroke="#eef4ff" />
    <text x="28" y="80" fill="#6b7280" font-family="Arial" font-size="12">(Sample document text shown here)</text>
  </g>

  <g transform="translate(60,260)">
    <rect width="1100" height="120" rx="8" fill="#ffffff" stroke="#e6eef8" />
    <text x="20" y="34" fill="#0b1220" font-family="Arial" font-size="16">Ask a question</text>
    <rect x="20" y="48" width="880" height="36" rx="6" fill="#ffffff" stroke="#cbd5e1" />
    <text x="32" y="74" fill="#6b7280" font-family="Arial" font-size="14">What is this document about?</text>
    <rect x="920" y="48" width="150" height="36" rx="6" fill="#0f172a" />
    <text x="960" y="74" fill="#fff" font-family="Arial" font-size="14">Ask</text>
  </g>

  <g transform="translate(60,420)">
    <rect width="1100" height="320" rx="8" fill="#ffffff" stroke="#e6eef8" />
    <text x="20" y="34" fill="#0b1220" font-family="Arial" font-size="16">Answer</text>
    <rect x="20" y="48" width="1040" height="250" rx="6" fill="#fbfdff" stroke="#eef4ff" />
    <text x="32" y="80" fill="#0b1220" font-family="Arial" font-size="14">This document is about testing and how to write unit tests.</text>
    <text x="32" y="110" fill="#6b7280" font-family="Arial" font-size="12">Confidence: 0.72</text>
  </g>
</svg>